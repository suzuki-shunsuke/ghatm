---
name: wc-test
on:
  workflow_call:
    inputs:
      docker_is_changed:
        required: false
        type: boolean
    secrets:
      TAKUMI_GUARD_BOT_ID:
        required: true

jobs:
  test:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - uses: flatt-security/setup-takumi-guard-golang@2e3c7c40b538cd68b2ac483def12982ebc8bc02e # v1
        with:
          bot-id: ${{secrets.TAKUMI_GUARD_BOT_ID}}

      - uses: aquaproj/aqua-installer@96a9bc20066c5bf5e275b41019cfc165b25f4e2e # v4.0.5
        with:
          aqua_version: v2.61.0
      - run: golangci-lint run --timeout 120s
        env:
          AQUA_GITHUB_TOKEN: ${{github.token}}
      - run: go test -v ./... -race -covermode=atomic
      - run: go run ./cmd/ghatm set testdata/before.yaml
      - run: diff testdata/before.yaml testdata/after.yaml
      - run: go run ./cmd/ghatm set -auto
        env:
          GITHUB_TOKEN: ${{github.token}}
      - run: git diff --exit-code .github/workflows/test.yaml
